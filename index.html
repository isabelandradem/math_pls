<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Performance Level Distribution Report</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600&family=Inter:wght@400;600&family=Plus+Jakarta+Sans:wght@400;600&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Plus Jakarta Sans', sans-serif;
      color: #231f20;
      background: #f5f5f5;
      padding: 32px;
    }

    h1 {
      font-family: 'Inter', sans-serif;
      font-weight: 600;
      font-size: 24px;
      color: #231f20;
      margin-bottom: 8px;
    }

    .subtitle {
      font-size: 14px;
      color: #6b6b6b;
      margin-bottom: 24px;
    }

    .tab-bar {
      display: flex;
      gap: 4px;
      margin-bottom: 20px;
      max-width: 900px;
    }

    .tab {
      font-family: 'Plus Jakarta Sans', sans-serif;
      font-weight: 600;
      font-size: 14px;
      padding: 10px 20px;
      border: none;
      border-radius: 8px 8px 0 0;
      cursor: pointer;
      background: #e9e9e9;
      color: #6b6b6b;
      transition: background 0.15s, color 0.15s;
    }

    .tab:hover { background: #ddd; }

    .tab.active {
      background: #fff;
      color: #231f20;
      box-shadow: 0 -1px 4px rgba(0,0,0,0.06);
    }

    .report-card {
      background: #fff;
      border: 1px solid #e9e9e9;
      border-radius: 8px;
      padding: 20px;
      width: 100%;
      max-width: 900px;
      display: none;
    }

    .report-card.visible { display: block; }

    .header-row {
      display: flex;
      align-items: center;
      padding-bottom: 8px;
    }

    .col-domain {
      width: 200px;
      flex-shrink: 0;
      padding: 0 8px;
    }

    .header-domain {
      font-weight: 400;
      font-size: 16px;
    }

    .cells-group {
      display: flex;
      gap: 2px;
      flex: 1;
      padding-right: 8px;
    }

    .header-cell {
      width: 160px;
      flex-shrink: 0;
      text-align: center;
      font-family: 'Fredoka', sans-serif;
      font-weight: 600;
      font-size: 16px;
    }

    .header-cell.pink   { color: #EF6693; }
    .header-cell.purple { color: #A47FBB; }
    .header-cell.blue   { color: #47B6CE; }
    .header-cell.teal   { color: #13BF96; }

    .header-divider {
      height: 1px;
      background: #e9e9e9;
    }

    .data-row {
      display: flex;
      align-items: center;
      padding: 16px 0;
    }

    .domain-label {
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .domain-name {
      font-family: 'Plus Jakarta Sans', sans-serif;
      font-weight: 600;
      font-size: 14px;
      color: #231f20;
    }

    .data-cell {
      width: 160px;
      height: 34px;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 8px;
      font-family: 'Plus Jakarta Sans', sans-serif;
      font-weight: 400;
      font-size: 13px;
      color: #231f20;
      white-space: nowrap;
    }

    .data-cell.highlighted {
      font-weight: 600;
      font-size: 14px;
    }

    .data-cell.empty {
      background: #f5f5f5;
      color: #c0c0c0;
    }

    .data-cell.pink            { background: #F9C1D4; }
    .data-cell.pink.highlighted  { background: #EF6693; }
    .data-cell.purple          { background: #DBCBE4; }
    .data-cell.purple.highlighted { background: #A47FBB; }
    .data-cell.blue            { background: #B6E2EB; }
    .data-cell.blue.highlighted  { background: #47B6CE; }
    .data-cell.teal            { background: #A2E5D6; }
    .data-cell.teal.highlighted  { background: #13BF96; }

    .row-divider {
      height: 1px;
      background: #f2f2f2;
    }

    .charts-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 24px;
    }

    .chart-card {
      background: #fff;
      border: 1px solid #e9e9e9;
      border-radius: 8px;
      padding: 16px 20px;
    }

    .chart-card h3 {
      font-family: 'Plus Jakarta Sans', sans-serif;
      font-weight: 600;
      font-size: 14px;
      color: #231f20;
      margin-bottom: 8px;
    }
  </style>
</head>
<body>
  <h1>Performance Level Distribution</h1>
  <p class="subtitle">Math assessments · Ages 3 &amp; 4 only</p>

  <div class="tab-bar">
    <button class="tab active" onclick="showTab('age3')">Age 3</button>
    <button class="tab" onclick="showTab('age4')">Age 4</button>
    <button class="tab" onclick="showTab('total')">Total (Ages 3 &amp; 4)</button>
    <span style="margin-left:auto"></span>
    <button class="tab" onclick="showTab('charts')">Bar Charts</button>
  </div>

  <div class="report-card visible" id="card-age3"></div>
  <div class="report-card" id="card-age4"></div>
  <div class="report-card" id="card-total"></div>
  <div id="card-charts" class="charts-grid" style="display:none; max-width:900px;"></div>

  <script>
    const COLUMNS = [
      { label: 'Age 2 Skills', key: '2YO', color: 'pink' },
      { label: 'Age 3 Skills', key: '3YO', color: 'purple' },
      { label: 'Age 4 Skills', key: '4YO', color: 'blue' },
      { label: 'Kinder Skills', key: 'KG', color: 'teal' },
    ];

    const ASSESSMENTS = [
      {
        id: 'MAT9', name: 'MAT9: Shapes',
        levels: ['2YO','3YO','4YO','KG'],
        age3: { counts: [77,30,22,18], total: 147 },
        age4: { counts: [138,112,92,86], total: 428 },
        combined: { counts: [215,142,114,104], total: 575 },
        hasBlue: true,
        orange: {
          levels: ['2YO','3YO','4YO','KG'],
          age3: { counts: [77,30,22,18], total: 147 },
          age4: { counts: [138,112,92,86], total: 428 },
        },
        blue: {
          levels: ['2YO','3YO','4YO','KG'],
          age3: { counts: [64,42,23,18], total: 147 },
          age4: { counts: [77,146,108,97], total: 428 },
        },
      },
      {
        id: 'MAT4', name: 'MAT4: More or Less',
        levels: ['2YO','3YO','4YO','KG'],
        age3: { counts: [57,39,8,2], total: 106 },
        age4: { counts: [138,111,52,69], total: 370 },
        combined: { counts: [195,150,60,71], total: 476 },
        hasBlue: false,
      },
      {
        id: 'MAT3', name: 'MAT3: Count 1 by 1',
        levels: ['2YO','3YO','4YO','KG'],
        age3: { counts: [65,24,10,6], total: 105 },
        age4: { counts: [94,94,57,47], total: 292 },
        combined: { counts: [159,118,67,53], total: 397 },
        hasBlue: true,
        orange: {
          levels: ['2YO','3YO','4YO','KG'],
          age3: { counts: [65,24,10,6], total: 105 },
          age4: { counts: [94,94,57,47], total: 292 },
        },
        blue: {
          levels: ['2YO','3YO','4YO','KG'],
          age3: { counts: [57,23,18,7], total: 105 },
          age4: { counts: [60,95,83,54], total: 292 },
        },
      },
      {
        id: 'MAT10', name: 'MAT10: Position of Objects',
        levels: ['3YO','4YO','KG'],
        age3: { counts: [37,52,43], total: 132 },
        age4: { counts: [75,138,181], total: 394 },
        combined: { counts: [112,190,224], total: 526 },
        hasBlue: false,
      },
      {
        id: 'MAT8', name: 'MAT8: Measurement',
        levels: ['3YO','4YO','KG'],
        age3: { counts: [51,79,7], total: 137 },
        age4: { counts: [123,229,79], total: 431 },
        combined: { counts: [174,308,86], total: 568 },
        hasBlue: true,
        orange: {
          levels: ['3YO','4YO','KG'],
          age3: { counts: [51,79,7], total: 137 },
          age4: { counts: [123,229,79], total: 431 },
        },
        blue: {
          levels: ['3YO','4YO','KG'],
          age3: { counts: [26,92,19], total: 137 },
          age4: { counts: [52,232,147], total: 431 },
        },
      },
      {
        id: 'MAT2', name: 'MAT2: Subitizing',
        levels: ['3YO','4YO','KG'],
        age3: { counts: [53,22,12], total: 87 },
        age4: { counts: [108,83,88], total: 279 },
        combined: { counts: [161,105,100], total: 366 },
        hasBlue: false,
      },
      {
        id: 'MAT5', name: 'MAT5: Numerals',
        levels: ['3YO','4YO','KG'],
        age3: { counts: [96,24,14], total: 134 },
        age4: { counts: [179,182,54], total: 415 },
        combined: { counts: [275,206,68], total: 549 },
        hasBlue: false,
      },
      {
        id: 'MAT7', name: 'MAT7: Patterns',
        levels: ['3YO','4YO','KG'],
        age3: { counts: [90,17,15], total: 122 },
        age4: { counts: [219,58,114], total: 391 },
        combined: { counts: [309,75,129], total: 513 },
        hasBlue: true,
        orange: {
          levels: ['3YO','4YO','KG'],
          age3: { counts: [90,17,15], total: 122 },
          age4: { counts: [219,58,114], total: 391 },
        },
        blue: {
          levels: ['3YO','4YO','KG'],
          age3: { counts: [59,43,20], total: 122 },
          age4: { counts: [110,132,149], total: 391 },
        },
      },
      {
        id: 'MAT6a', name: 'MAT6a: Add',
        levels: ['4YO','KG'],
        age3: { counts: [110,14], total: 124 },
        age4: { counts: [283,81], total: 364 },
        combined: { counts: [393,95], total: 488 },
        hasBlue: false,
      },
      {
        id: 'MAT6b', name: 'MAT6b: Subtract',
        levels: ['4YO','KG'],
        age3: { counts: [106,14], total: 120 },
        age4: { counts: [258,84], total: 342 },
        combined: { counts: [364,98], total: 462 },
        hasBlue: false,
      },
    ];

    function getCells(assessment, ageKey) {
      const data = assessment[ageKey];
      const cells = [];

      for (const col of COLUMNS) {
        const idx = assessment.levels.indexOf(col.key);
        if (idx === -1) {
          cells.push(null);
        } else {
          const count = data.counts[idx];
          const total = data.total;
          const pct = total > 0 ? count / total : 0;
          cells.push({ pct, count, total });
        }
      }

      const maxPct = Math.max(...cells.filter(c => c !== null).map(c => c.pct));
      return cells.map(c => {
        if (c === null) return null;
        return { ...c, highlighted: c.pct === maxPct && c.pct > 0 };
      });
    }

    function formatCell(cell, highlighted) {
      const pct = Math.round(cell.pct * 100);
      if (highlighted) {
        return `<b>${pct}% (${cell.count} of ${cell.total})</b>`;
      }
      return `${pct}% (${cell.count} of ${cell.total})`;
    }

    function renderCard(containerId, ageKey) {
      const el = document.getElementById(containerId);
      let html = '';

      html += '<p style="font-size:12px; color:#6b6b6b; margin-bottom:12px; font-style:italic;">Performance levels calculated using Orange (default) cutoffs.</p>';

      html += '<div class="header-row">';
      html += '  <div class="col-domain header-domain">Assessment Scale</div>';
      html += '  <div class="cells-group">';
      for (const col of COLUMNS) {
        html += `<div class="header-cell ${col.color}">${col.label}</div>`;
      }
      html += '  </div>';
      html += '</div>';
      html += '<div class="header-divider"></div>';

      for (const assessment of ASSESSMENTS) {
        const cells = getCells(assessment, ageKey);

        html += '<div class="data-row">';
        html += '  <div class="col-domain">';
        html += '    <div class="domain-label">';
        html += `      <span class="domain-name">${assessment.name}</span>`;
        html += '    </div>';
        html += '  </div>';
        html += '  <div class="cells-group">';
        for (let i = 0; i < cells.length; i++) {
          const cell = cells[i];
          const color = COLUMNS[i].color;
          if (cell === null) {
            html += `<div class="data-cell empty">—</div>`;
          } else {
            const hl = cell.highlighted ? ' highlighted' : '';
            html += `<div class="data-cell ${color}${hl}">${formatCell(cell, cell.highlighted)}</div>`;
          }
        }
        html += '  </div>';
        html += '</div>';
        html += '<div class="row-divider"></div>';
      }

      el.innerHTML = html;
    }

    function showTab(tab) {
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      document.querySelectorAll('.report-card').forEach(c => c.classList.remove('visible'));
      document.getElementById('card-charts').style.display = 'none';

      const tabs = { age3: 0, age4: 1, total: 2, charts: 3 };
      document.querySelectorAll('.tab')[tabs[tab]].classList.add('active');

      if (tab === 'charts') {
        document.getElementById('card-charts').style.display = 'grid';
        renderCharts();
      } else {
        document.getElementById(`card-${tab}`).classList.add('visible');
      }
    }

    const LEVEL_LABELS = { '2YO': 'Age 2 Skills', '3YO': 'Age 3 Skills', '4YO': 'Age 4 Skills', 'KG': 'Kinder Skills' };
    const ORANGE_COLORS = { age3: '#F6B073', age4: '#C75B12' };
    const BLUE_COLORS = { age3: '#48B7CE', age4: '#266782' };
    let chartInstances = {};
    let cutoffState = {};

    function createChart(id, labels, age3Pcts, age4Pcts, colors, src) {
      return new Chart(document.getElementById(`chart-${id}`), {
        type: 'bar',
        data: {
          labels,
          datasets: [
            { label: 'Age 3', data: age3Pcts, backgroundColor: colors.age3, borderRadius: 4 },
            { label: 'Age 4', data: age4Pcts, backgroundColor: colors.age4, borderRadius: 4 },
          ],
        },
        options: {
          responsive: true,
          animation: { duration: 0 },
          plugins: {
            legend: {
              title: { display: true, text: 'Student Age', font: { family: "'Plus Jakarta Sans', sans-serif", size: 12, weight: '600' }, padding: { bottom: 4 } },
              labels: { font: { family: "'Plus Jakarta Sans', sans-serif", size: 12 } }
            },
            tooltip: {
              callbacks: {
                label: ctx => {
                  const ageKey = ctx.datasetIndex === 0 ? 'age3' : 'age4';
                  const count = src[ageKey].counts[ctx.dataIndex];
                  const total = src[ageKey].total;
                  return `${ctx.dataset.label}: ${ctx.raw}% (${count} of ${total})`;
                }
              }
            }
          },
          scales: {
            y: {
              beginAtZero: true,
              max: 100,
              ticks: {
                callback: v => v + '%',
                font: { family: "'Plus Jakarta Sans', sans-serif", size: 11 }
              },
              grid: { color: '#f0f0f0' }
            },
            x: {
              title: { display: true, text: 'Assessment Score (Performance Level)', font: { family: "'Plus Jakarta Sans', sans-serif", size: 12, weight: '600' }, padding: { top: 8 } },
              ticks: { font: { family: "'Plus Jakarta Sans', sans-serif", size: 11 } },
              grid: { display: false }
            }
          },
          layout: { padding: { top: 20 } },
        },
        plugins: [{
          id: 'datalabels',
          afterDraw(chart) {
            const ctx2 = chart.ctx;
            ctx2.font = "600 11px 'Plus Jakarta Sans', sans-serif";
            ctx2.fillStyle = '#231f20';
            ctx2.textAlign = 'center';
            chart.data.datasets.forEach((dataset, di) => {
              const meta = chart.getDatasetMeta(di);
              meta.data.forEach((bar, i) => {
                const val = dataset.data[i];
                if (val > 0) ctx2.fillText(val + '%', bar.x, bar.y - 6);
              });
            });
          }
        }]
      });
    }

    function renderCharts() {
      Object.values(chartInstances).forEach(c => c.destroy());
      chartInstances = {};
      const container = document.getElementById('card-charts');
      container.innerHTML = '';

      for (const a of ASSESSMENTS) {
        if (a.hasBlue && !cutoffState[a.id]) cutoffState[a.id] = 'orange';
        const isBlue = a.hasBlue && cutoffState[a.id] === 'blue';
        const src = isBlue ? a.blue : (a.hasBlue ? a.orange : a);
        const levels = src.levels || a.levels;
        const colors = isBlue ? BLUE_COLORS : ORANGE_COLORS;

        const card = document.createElement('div');
        card.className = 'chart-card';

        let toggleHtml = '';
        if (a.hasBlue) {
          const oActive = !isBlue;
          const bActive = isBlue;
          toggleHtml = `<div style="display:inline-flex; gap:4px; margin-left:auto;">
            <button onclick="switchCutoff('${a.id}','orange')" style="font-family:'Plus Jakarta Sans',sans-serif; font-weight:600; font-size:11px; padding:3px 10px; border-radius:4px; cursor:pointer; border:1.5px solid #C75B12; background:${oActive?'#C75B12':'#fff'}; color:${oActive?'#fff':'#C75B12'}; transition:all .15s;">Orange Cutoffs</button>
            <button onclick="switchCutoff('${a.id}','blue')" style="font-family:'Plus Jakarta Sans',sans-serif; font-weight:600; font-size:11px; padding:3px 10px; border-radius:4px; cursor:pointer; border:1.5px solid #266782; background:${bActive?'#266782':'#fff'}; color:${bActive?'#fff':'#266782'}; transition:all .15s;">Blue Cutoffs</button>
          </div>`;
        }

        card.id = 'card-wrap-' + a.id;
        card.innerHTML = `<div style="display:flex; align-items:center; margin-bottom:8px;"><h3 style="margin:0">${a.name}</h3>${toggleHtml}</div><canvas id="chart-${a.id}"></canvas>`;
        container.appendChild(card);

        const labels = levels.map(l => LEVEL_LABELS[l]);
        const age3Pcts = levels.map((_, i) => Math.round(src.age3.counts[i] / src.age3.total * 100));
        const age4Pcts = levels.map((_, i) => Math.round(src.age4.counts[i] / src.age4.total * 100));

        chartInstances[a.id] = createChart(a.id, labels, age3Pcts, age4Pcts, colors, src);
      }
    }

    function switchCutoff(assessmentId, cutoff) {
      cutoffState[assessmentId] = cutoff;
      rebuildSingleChart(assessmentId);
    }

    function rebuildSingleChart(assessmentId) {
      const a = ASSESSMENTS.find(x => x.id === assessmentId);
      if (!a) return;

      if (chartInstances[a.id]) chartInstances[a.id].destroy();

      const isBlue = a.hasBlue && cutoffState[a.id] === 'blue';
      const src = isBlue ? a.blue : (a.hasBlue ? a.orange : a);
      const levels = src.levels || a.levels;
      const colors = isBlue ? BLUE_COLORS : ORANGE_COLORS;

      const card = document.getElementById('card-wrap-' + a.id);
      const oActive = !isBlue;
      const bActive = isBlue;
      const toggleHtml = `<div style="display:inline-flex; gap:4px; margin-left:auto;">
        <button onclick="switchCutoff('${a.id}','orange')" style="font-family:'Plus Jakarta Sans',sans-serif; font-weight:600; font-size:11px; padding:3px 10px; border-radius:4px; cursor:pointer; border:1.5px solid #C75B12; background:${oActive?'#C75B12':'#fff'}; color:${oActive?'#fff':'#C75B12'}; transition:all .15s;">Orange Cutoffs</button>
        <button onclick="switchCutoff('${a.id}','blue')" style="font-family:'Plus Jakarta Sans',sans-serif; font-weight:600; font-size:11px; padding:3px 10px; border-radius:4px; cursor:pointer; border:1.5px solid #266782; background:${bActive?'#266782':'#fff'}; color:${bActive?'#fff':'#266782'}; transition:all .15s;">Blue Cutoffs</button>
      </div>`;

      card.innerHTML = `<div style="display:flex; align-items:center; margin-bottom:8px;"><h3 style="margin:0">${a.name}</h3>${toggleHtml}</div><canvas id="chart-${a.id}"></canvas>`;

      const labels = levels.map(l => LEVEL_LABELS[l]);
      const age3Pcts = levels.map((_, i) => Math.round(src.age3.counts[i] / src.age3.total * 100));
      const age4Pcts = levels.map((_, i) => Math.round(src.age4.counts[i] / src.age4.total * 100));

      chartInstances[a.id] = createChart(a.id, labels, age3Pcts, age4Pcts, colors, src);
    }

    renderCard('card-age3', 'age3');
    renderCard('card-age4', 'age4');
    renderCard('card-total', 'combined');
  </script>
</body>
</html>
